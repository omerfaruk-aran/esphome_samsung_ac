name: "Question"
description: "Use this template to ask a question."
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## Question Template

        Thank you for asking a question! Please provide as much information as possible to help us understand and address your question efficiently.

  - type: input
    attributes:
      label: Your Question
      description: Please describe your question in detail.
      placeholder: Write your question here...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Information
      description: Provide any additional context, code snippets, or links that might help us understand your question.
      placeholder: Add more details here...
