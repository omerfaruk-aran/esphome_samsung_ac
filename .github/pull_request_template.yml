name: "Pull Request"
description: "Use this template for submitting a pull request."
title: "[Pull Request] "
labels: ["pull request"]
body:
  - type: markdown
    attributes:
      value: |
        ## Description

  - type: markdown
    attributes:
      value: |
        ### What does this Pull Request do?
        <!-- Please select the appropriate option. -->
        
  - type: checkboxes
    attributes:
      label: PR Type
      description: Select the purpose of this Pull Request.
      options:
        - label: Bug Fix
        - label: New Feature
        - label: Code Improvement
        - label: Documentation Update

  - type: textarea
    attributes:
      label: Details of Changes
      description: |
        Please list the key changes or updates in this PR. 
        Include any relevant issue numbers if applicable.

  - type: textarea
    attributes:
      label: Related Issues
      description: |
        If this PR addresses an issue, link it here (e.g., Fixes #123).
        Otherwise, leave this section blank.

  - type: checkboxes
    attributes:
      label: Checklist
      description: Ensure the following before submitting:
      options:
        - label: Code compiles without errors.
        - label: All tests pass.
        - label: Changes have been tested on relevant devices.
        - label: Documentation updated (if necessary).
        - label: This PR is ready for review.

  - type: markdown
    attributes:
      value: |
        ## Environment Information

  - type: input
    attributes:
      label: ESPHome Version
      description: Provide the ESPHome version you are using.

  - type: input
    attributes:
      label: samsung_ac Version
      description: Provide the samsung_ac version you are using.

  - type: input
    attributes:
      label: Home Assistant Version
      description: Provide the Home Assistant version you are using.

  - type: markdown
    attributes:
      value: |
        ### Devices Information

  - type: checkboxes
    attributes:
      label: Air Conditioner Type
      description: Select the type of air conditioner.
      options:
        - label: NASA
        - label: NON-NASA
        - label: Other

  - type: input
    attributes:
      label: Air Conditioner Model
      description: Provide the model number of your air conditioner (e.g., AR09TXFCAWKNEU).

  - type: input
    attributes:
      label: Outdoor Unit Model
    description: Provide the model number of your outdoor unit (e.g., AJ050TXJ2KH/EA).

  - type: input
    attributes:
      label: ESP Device Model
      description: Provide the model of your ESP device (e.g., M5STACK ATOM Lite + M5STACK RS-485).

  - type: input
    attributes:
      label: Wiring Configuration
      description: Describe the wiring configuration (e.g., F1/F2).

  - type: markdown
    attributes:
      value: |
        ## Test Plan

  - type: textarea
    attributes:
      label: How were these changes tested?
      description: Please describe how you tested your changes. Include details on the environment, devices used, and test cases.

  - type: textarea
    attributes:
      label: Logs
      description: Include relevant logs that show the changes in action (both ESPHome and Home Assistant logs).

  - type: markdown
    attributes:
      value: |
        ## Additional Information

  - type: textarea
    attributes:
      label: Additional Information
      description: Provide any additional context or information related to this PR here.

  - type: textarea
    attributes:
      label: YAML Configuration
      description: Include the relevant YAML configuration used for testing this PR.
